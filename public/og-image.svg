<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1035"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#ff6584"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(108,99,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(108,99,255,0.08)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(108,99,255,0.08)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(108,99,255,0.08)" stroke-width="1"/>

  <!-- Glow blob -->
  <ellipse cx="200" cy="150" rx="200" ry="150" fill="rgba(108,99,255,0.12)" filter="url(#glow)"/>
  <ellipse cx="1000" cy="480" rx="180" ry="130" fill="rgba(255,101,132,0.1)" filter="url(#glow)"/>

  <!-- MH Logo -->
  <rect x="80" y="70" width="80" height="80" rx="18" fill="url(#accent)"/>
  <text x="120" y="126" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">MH</text>

  <!-- Name -->
  <text x="80" y="260" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="white">Mahmudul Hassan</text>
  <text x="80" y="340">
    <tspan font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="url(#accent)">Mithun</tspan>
  </text>

  <!-- Title -->
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)" font-weight="400">AI &amp; SaaS Developer · London, UK</text>

  <!-- Divider -->
  <rect x="80" y="440" width="120" height="3" rx="2" fill="url(#accent)"/>

  <!-- Tags -->
  <rect x="80" y="470" width="160" height="36" rx="18" fill="rgba(108,99,255,0.2)" stroke="rgba(108,99,255,0.4)" stroke-width="1"/>
  <text x="160" y="493" font-family="Arial, sans-serif" font-size="15" fill="#6c63ff" text-anchor="middle" font-weight="600">FastAPI · LangGraph</text>

  <rect x="258" y="470" width="140" height="36" rx="18" fill="rgba(255,101,132,0.15)" stroke="rgba(255,101,132,0.35)" stroke-width="1"/>
  <text x="328" y="493" font-family="Arial, sans-serif" font-size="15" fill="#ff6584" text-anchor="middle" font-weight="600">Next.js 15</text>

  <rect x="416" y="470" width="130" height="36" rx="18" fill="rgba(67,233,123,0.12)" stroke="rgba(67,233,123,0.3)" stroke-width="1"/>
  <text x="481" y="493" font-family="Arial, sans-serif" font-size="15" fill="#43e97b" text-anchor="middle" font-weight="600">ML · YOLOv8</text>

  <rect x="564" y="470" width="140" height="36" rx="18" fill="rgba(0,210,255,0.12)" stroke="rgba(0,210,255,0.3)" stroke-width="1"/>
  <text x="634" y="493" font-family="Arial, sans-serif" font-size="15" fill="#00d2ff" text-anchor="middle" font-weight="600">Data Science</text>

  <!-- Stats -->
  <text x="900" y="250" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)">5+</text>
  <text x="900" y="285" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">Live SaaS Products</text>

  <text x="900" y="370" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)">10+</text>
  <text x="900" y="405" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">Projects Built</text>

  <!-- URL -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.35)">mhassanmithun.com</text>
  <text x="1120" y="580" font-family="Arial, sans-serif" font-size="20" fill="rgba(108,99,255,0.6)" text-anchor="end">BSc Data Science &amp; AI · UEL</text>
</svg>
